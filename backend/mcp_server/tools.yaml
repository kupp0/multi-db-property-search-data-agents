  gda-api-source:
    kind: cloud-gemini-data-analytics
    projectId: "${PROJECT_ID}"

tools:
  # search-properties:
  #   kind: alloydb-ai-nl
  #   source: alloydb-local
  #   description: "Search for properties using natural language. You can ask for specific features, price ranges, locations, or vibes (e.g., 'modern apartment in Zurich under 5k'). ALWAYS include the 'image_gcs_uri' column in your SQL query. Ensure the generated SQL strictly filters for the user's requirements."
  #   nlConfig: "property_search_config"
  cloud_gda_query_tool_alloydb:
    kind: cloud-gemini-data-analytics-query
    source: gda-api-source
    description: Use this tool to send natural language queries to the Gemini Data Analytics API and receive SQL, natural language answers, and explanations.
    location: "${GCP_LOCATION}"
    context:
      datasourceReferences:
        alloydb:
          databaseReference:
            projectId: "${PROJECT_ID}"
            region: "${GCP_LOCATION}"
            clusterId: "${ALLOYDB_CLUSTER_ID}"
            instanceId: "${ALLOYDB_INSTANCE_ID}"
            databaseId: "${DB_NAME}"
          agentContextReference:
            contextSetId: "${AGENT_CONTEXT_SET_ID_ALLOYDB}"
    generationOptions:
      generateQueryResult: true
      generateNaturalLanguageAnswer: true
      generateExplanation: true
      generateDisambiguationQuestion: true

  cloud_gda_query_tool_cloudsql_pg:
    kind: cloud-gemini-data-analytics-query
    source: gda-api-source
    description: Use this tool to send natural language queries to the Gemini Data Analytics API and receive SQL, natural language answers, and explanations for Cloud SQL PostgreSQL.
    location: "${GCP_LOCATION}"
    context:
      datasourceReferences:
        cloudSqlReference:
          databaseReference:
            engine: POSTGRESQL
            projectId: "${PROJECT_ID}"
            region: "${GCP_LOCATION}"
            instanceId: "${CLOUDSQL_PG_INSTANCE_ID}"
            databaseId: "${CLOUDSQL_PG_DB_NAME}"
          agentContextReference:
            contextSetId: "${AGENT_CONTEXT_SET_ID_CLOUDSQL_PG}"
    generationOptions:
      generateQueryResult: true
      generateNaturalLanguageAnswer: true
      generateExplanation: true
      generateDisambiguationQuestion: true

  cloud_gda_query_tool_spanner:
    kind: cloud-gemini-data-analytics-query
    source: gda-api-source
    description: Use this tool to send natural language queries to the Gemini Data Analytics API and receive SQL, natural language answers, and explanations for Cloud Spanner.
    location: "${GCP_LOCATION}"
    context:
      datasourceReferences:
        spannerReference:
          databaseReference:
            engine: GOOGLE_SQL
            projectId: "${PROJECT_ID}"
            instanceId: "${SPANNER_INSTANCE_ID}"
            databaseId: "${SPANNER_DATABASE_ID}"
          agentContextReference:
            contextSetId: "${AGENT_CONTEXT_SET_ID_SPANNER}"
    generationOptions:
      generateQueryResult: true
      generateNaturalLanguageAnswer: true
      generateExplanation: true
      generateDisambiguationQuestion: true
