apiVersion: serving.knative.dev/v1
kind: Service
# This YAML defines a Cloud Run Service.
# Cloud Run is a fully managed serverless platform that automatically scales your stateless containers.
metadata:
  name: ${BACKEND_SERVICE}
  annotations:
    # 'BETA' launch stage allows access to some preview features if needed.
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/network-interfaces: '[{"network":"search-demo-vpc","subnetwork":"search-demo-vpc"}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      # The Service Account identity that this container will run as.
      # It must have permissions to access Vertex AI, AlloyDB, and GCS.
      serviceAccountName: ${SERVICE_ACCOUNT}
      containers:
      # --- MAIN APPLICATION CONTAINER ---
      - name: backend
        image: ${BACKEND_IMAGE}:${TAG}
        ports:
        - containerPort: 8080
        env:
        - name: GCP_PROJECT_ID
          value: "${PROJECT_ID}"
        - name: GCP_LOCATION
          value: "${REGION}"
        - name: AGENT_CONTEXT_SET_ID_ALLOYDB
          value: "${AGENT_CONTEXT_SET_ID_ALLOYDB}"
        - name: AGENT_CONTEXT_SET_ID_CLOUDSQL_PG
          value: "${AGENT_CONTEXT_SET_ID_CLOUDSQL_PG}"
        - name: AGENT_CONTEXT_SET_ID_SPANNER
          value: "${AGENT_CONTEXT_SET_ID_SPANNER}"
        - name: DB_HOST
          value: "${DB_HOST}"
        - name: DB_NAME
          value: "${DB_NAME}"
        - name: DB_USER
          value: "${DB_USER}"
        - name: DB_PASSWORD
          value: "${DB_PASSWORD}"
        - name: CLOUDSQL_PG_HOST
          value: "127.0.0.1"
        - name: CLOUDSQL_PG_PORT
          value: "5433"
        - name: CLOUDSQL_PG_USER
          value: "${DB_USER}"
        - name: CLOUDSQL_PG_PASSWORD
          value: "${DB_PASSWORD}"
        - name: CLOUDSQL_PG_DB_NAME
          value: "${DB_NAME}"
      - name: alloydb-auth-proxy
        image: gcr.io/alloydb-connectors/alloydb-auth-proxy:latest
        args:
        - "${INSTANCE_CONNECTION_NAME}"
        - "--address=0.0.0.0"
        - "--port=5432"
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
        args:
        - "--port=5433"
        - "--private-ip"
        - "${PROJECT_ID}:${REGION}:${CLOUDSQL_PG_INSTANCE_ID}"
      

